<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Study & Dev Suite</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/mammoth/1.6.0/mammoth.browser.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=DM+Mono&display=swap');
        
        body {
            background: linear-gradient(to bottom right, #0f172a, #312e81, #0f172a);
            min-height: 100vh;
            font-family: 'Outfit', sans-serif;
        }
        .glass {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .mono { font-family: 'DM Mono', monospace; }
        .tab-active { border-bottom: 2px solid #a855f7; color: white; }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-thumb { background: rgba(255, 255, 255, 0.2); border-radius: 10px; }
    </style>
</head>
<body class="text-slate-200 p-4 md:p-8">

    <div class="max-w-6xl mx-auto">
        <header class="text-center mb-8">
            <div class="flex items-center justify-center gap-3 mb-2">
                <div class="bg-purple-600 p-2 rounded-xl shadow-lg shadow-purple-500/20">
                    <i data-lucide="sparkles" class="w-8 h-8 text-white"></i>
                </div>
                <h1 class="text-4xl font-bold tracking-tight text-white">AI Study & Dev <span class="text-purple-400">Suite</span></h1>
            </div>
            <p class="text-slate-400 text-sm mb-6">Powered by OpenRouter AI</p>
            
            <div class="flex justify-center gap-4 mb-8">
                <button onclick="switchTab('mcq')" id="btn-mcq" class="px-6 py-2 font-medium transition-all tab-active">MCQ Solver</button>
                <button onclick="switchTab('code')" id="btn-code" class="px-6 py-2 font-medium text-slate-500 hover:text-slate-300 transition-all">Code Reviewer</button>
                <button onclick="toggleSettings()" class="ml-4 p-2 rounded-full hover:bg-white/10 transition">
                    <i data-lucide="settings" class="w-5 h-5"></i>
                </button>
            </div>
        </header>

        <div id="settingsPanel" class="hidden mb-8 glass rounded-2xl p-6 border-purple-500/30">
            <h3 class="text-lg font-semibold mb-4 flex items-center gap-2">
                <i data-lucide="key" class="w-5 h-5 text-purple-400"></i> API Settings
            </h3>
            <div class="flex flex-col md:flex-row gap-3">
                <input type="password" id="apiKeyInput" placeholder="sk-or-v1-..." 
                    class="flex-1 px-4 py-2 rounded-xl bg-slate-900/50 border border-white/10 focus:ring-2 focus:ring-purple-500 outline-none transition">
                <div class="flex gap-2">
                    <button onclick="saveApiKey()" class="px-6 py-2 bg-purple-600 hover:bg-purple-500 rounded-xl font-medium transition">Save</button>
                    <button onclick="clearApiKey()" class="px-6 py-2 bg-red-500/20 hover:bg-red-500/40 text-red-300 rounded-xl font-medium transition">Clear</button>
                </div>
            </div>
            <p id="apiStatus" class="mt-2 text-xs text-slate-500 italic"></p>
        </div>

        <div id="mcqSection" class="grid lg:grid-cols-3 gap-6">
            <div class="lg:col-span-1 space-y-6">
                <div class="glass rounded-2xl p-5">
                    <h2 class="text-sm font-bold uppercase tracking-widest text-slate-400 mb-4 flex items-center gap-2">
                        <i data-lucide="file-text" class="w-4 h-4"></i> Knowledge Base
                    </h2>
                    <div id="dropZone" class="border-2 border-dashed border-white/10 rounded-xl p-6 text-center cursor-pointer hover:border-purple-500/50 hover:bg-white/5 transition-all">
                        <i data-lucide="upload-cloud" class="w-8 h-8 mx-auto mb-2 text-slate-500"></i>
                        <p class="text-xs text-slate-400">Drop <b>.docx</b> files here or click</p>
                        <input type="file" id="fileInput" accept=".docx" class="hidden" multiple>
                    </div>
                    <div id="docList" class="mt-4 space-y-2 max-h-60 overflow-y-auto"></div>
                </div>

                <div class="glass rounded-2xl p-5">
                    <h2 class="text-sm font-bold uppercase tracking-widest text-slate-400 mb-4">Model Selection</h2>
                    <select id="modelSelect" class="w-full bg-slate-900/50 border border-white/10 rounded-xl px-3 py-2 text-sm outline-none focus:ring-2 focus:ring-purple-500">
                        <option value="meta-llama/llama-3.2-3b-instruct:free">Llama 3.2 3B (Fast)</option>
                        <option value="google/gemma-3-4b-it:free">Gemma 3 4B</option>
                        <option value="mistralai/mistral-7b-instruct:free">Mistral 7B</option>
                        <option value="openai/gpt-oss-120b:free">GPT OSS 120B</option>
                    </select>
                </div>
            </div>

            <div class="lg:col-span-2 space-y-6">
                <div class="glass rounded-2xl p-6">
                    <textarea id="questionInput" placeholder="Paste your question here..." 
                        class="w-full h-32 bg-transparent border-none text-xl placeholder:text-slate-600 focus:ring-0 outline-none resize-none"></textarea>
                    
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-3 mt-4">
                        <div class="flex items-center gap-3 bg-white/5 rounded-xl px-4 py-2 border border-white/5 focus-within:border-purple-500/50">
                            <span class="mono text-purple-400 font-bold">A</span>
                            <input id="optA" type="text" placeholder="Option A" class="bg-transparent border-none focus:ring-0 text-sm w-full">
                        </div>
                        <div class="flex items-center gap-3 bg-white/5 rounded-xl px-4 py-2 border border-white/5 focus-within:border-purple-500/50">
                            <span class="mono text-purple-400 font-bold">B</span>
                            <input id="optB" type="text" placeholder="Option B" class="bg-transparent border-none focus:ring-0 text-sm w-full">
                        </div>
                        <div class="flex items-center gap-3 bg-white/5 rounded-xl px-4 py-2 border border-white/5 focus-within:border-purple-500/50">
                            <span class="mono text-purple-400 font-bold">C</span>
                            <input id="optC" type="text" placeholder="Option C" class="bg-transparent border-none focus:ring-0 text-sm w-full">
                        </div>
                        <div class="flex items-center gap-3 bg-white/5 rounded-xl px-4 py-2 border border-white/5 focus-within:border-purple-500/50">
                            <span class="mono text-purple-400 font-bold">D</span>
                            <input id="optD" type="text" placeholder="Option D" class="bg-transparent border-none focus:ring-0 text-sm w-full">
                        </div>
                    </div>

                    <button onclick="solveMCQ()" id="solveBtn" class="w-full mt-6 py-4 bg-gradient-to-r from-purple-600 to-indigo-600 hover:from-purple-500 hover:to-indigo-500 rounded-xl font-bold text-white transition-all shadow-lg shadow-purple-500/20 flex items-center justify-center gap-2">
                        <i data-lucide="zap" class="w-5 h-5"></i> Find Correct Answer
                    </button>
                </div>

                <div id="mcqResult" class="min-h-[100px]">
                    </div>
            </div>
        </div>

        <div id="codeSection" class="hidden grid md:grid-cols-2 gap-6">
            <div class="glass rounded-2xl p-6">
                <div class="flex justify-between items-center mb-4">
                    <h2 class="text-xl font-bold text-white">Source Code</h2>
                    <div class="flex gap-2" id="codeExamples"></div>
                </div>
                <textarea id="codeInput" placeholder="Paste your code for analysis..." 
                    class="w-full h-[450px] bg-slate-900/50 rounded-xl p-4 font-mono text-sm border border-white/10 focus:ring-2 focus:ring-purple-500 outline-none resize-none text-purple-100"></textarea>
                
                <button onclick="analyzeCode()" id="analyzeBtn" class="w-full mt-4 py-4 bg-gradient-to-r from-emerald-600 to-teal-600 hover:from-emerald-500 hover:to-teal-500 rounded-xl font-bold transition-all flex items-center justify-center gap-2">
                    <i data-lucide="search-code" class="w-5 h-5"></i> Review Code
                </button>
            </div>

            <div id="codeResult" class="glass rounded-2xl p-6 flex flex-col items-center justify-center text-slate-500">
                <i data-lucide="bot" class="w-16 h-16 mb-4 opacity-20"></i>
                <p>AI Analysis will appear here</p>
            </div>
        </div>
    </div>

    <script>
        // --- Core State ---
        let apiKey = localStorage.getItem('or_api_key') || '';
        let uploadedDocs = [];
        let currentTab = 'mcq';

        // --- Init ---
        function init() {
            lucide.createIcons();
            if (apiKey) {
                document.getElementById('apiKeyInput').value = apiKey;
                document.getElementById('apiStatus').innerText = "✓ Key loaded from storage";
            }
            setupDragAndDrop();
            setupCodeExamples();
        }

        // --- Tab Logic ---
        function switchTab(tab) {
            currentTab = tab;
            document.getElementById('mcqSection').classList.toggle('hidden', tab !== 'mcq');
            document.getElementById('codeSection').classList.toggle('hidden', tab !== 'code');
            document.getElementById('btn-mcq').classList.toggle('tab-active', tab === 'mcq');
            document.getElementById('btn-code').classList.toggle('tab-active', tab === 'code');
            document.getElementById('btn-mcq').classList.toggle('text-slate-500', tab !== 'mcq');
            document.getElementById('btn-code').classList.toggle('text-slate-500', tab !== 'code');
        }

        function toggleSettings() {
            document.getElementById('settingsPanel').classList.toggle('hidden');
        }

        // --- API Key Management ---
        function saveApiKey() {
            const val = document.getElementById('apiKeyInput').value.trim();
            if (!val.startsWith('sk-or-')) {
                alert("Invalid format. Key should start with sk-or-...");
                return;
            }
            apiKey = val;
            localStorage.setItem('or_api_key', val);
            document.getElementById('apiStatus').innerText = "✓ Key saved successfully";
            setTimeout(toggleSettings, 800);
        }

        function clearApiKey() {
            localStorage.removeItem('or_api_key');
            apiKey = '';
            document.getElementById('apiKeyInput').value = '';
            document.getElementById('apiStatus').innerText = "Key cleared";
        }

        // --- Document Processing ---
        function setupDragAndDrop() {
            const zone = document.getElementById('dropZone');
            const input = document.getElementById('fileInput');
            
            zone.onclick = () => input.click();
            zone.ondragover = (e) => { e.preventDefault(); zone.classList.add('bg-white/10'); };
            zone.ondragleave = () => zone.classList.remove('bg-white/10');
            zone.ondrop = (e) => { e.preventDefault(); zone.classList.remove('bg-white/10'); handleFiles(e.dataTransfer.files); };
            input.onchange = (e) => handleFiles(e.target.files);
        }

        async function handleFiles(files) {
            for (const file of files) {
                if (!file.name.endsWith('.docx')) continue;
                const docObj = { name: file.name, loading: true, text: '' };
                uploadedDocs.push(docObj);
                renderDocList();

                try {
                    const arrayBuffer = await file.arrayBuffer();
                    const result = await mammoth.extractRawText({ arrayBuffer });
                    docObj.text = result.value;
                    docObj.loading = false;
                } catch (e) {
                    console.error(e);
                    uploadedDocs = uploadedDocs.filter(d => d !== docObj);
                }
                renderDocList();
            }
        }

        function renderDocList() {
            const list = document.getElementById('docList');
            list.innerHTML = uploadedDocs.map((d, i) => `
                <div class="flex items-center justify-between bg-white/5 p-2 rounded-lg text-xs">
                    <span class="truncate w-40">${d.loading ? '⏳' : '📄'} ${d.name}</span>
                    <button onclick="removeDoc(${i})" class="text-red-400 hover:text-red-200">✕</button>
                </div>
            `).join('');
        }

        function removeDoc(i) {
            uploadedDocs.splice(i, 1);
            renderDocList();
        }

        // --- MCQ Solver Logic ---
        async function solveMCQ() {
            if (!apiKey) return alert("Please set your API key in Settings");
            const q = document.getElementById('questionInput').value.trim();
            const opts = {
                A: document.getElementById('optA').value.trim(),
                B: document.getElementById('optB').value.trim(),
                C: document.getElementById('optC').value.trim(),
                D: document.getElementById('optD').value.trim()
            };

            if (!q || !opts.A || !opts.B) return alert("Enter question and at least 2 options");

            const btn = document.getElementById('solveBtn');
            const resDiv = document.getElementById('mcqResult');
            
            btn.disabled = true;
            btn.innerHTML = `<span class="animate-spin text-xl">⏳</span> Processing...`;
            resDiv.innerHTML = `<div class="glass p-6 rounded-2xl animate-pulse text-center">AI is analyzing context and documents...</div>`;

            let context = uploadedDocs.map(d => d.text).join('\n\n');
            const model = document.getElementById('modelSelect').value;

            const prompt = `Use the following documents as context:\n${context}\n\nQuestion: ${q}\nOptions:\nA) ${opts.A}\nB) ${opts.B}\nC) ${opts.C}\nD) ${opts.D}\n\nReturn ONLY a JSON object: {"answer":"A/B/C/D", "explanation":"...", "confidence":"high/medium/low"}`;

            try {
                const response = await fetch("https://openrouter.ai/api/v1/chat/completions", {
                    method: "POST",
                    headers: {
                        "Authorization": `Bearer ${apiKey}`,
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify({
                        model: model,
                        messages: [{ role: "user", content: prompt }]
                    })
                });

                const data = await response.json();
                const content = data.choices[0].message.content;
                const result = JSON.parse(content.match(/\{[\s\S]*\}/)[0]);

                resDiv.innerHTML = `
                    <div class="glass p-6 rounded-2xl border-l-4 ${result.confidence === 'high' ? 'border-emerald-500' : 'border-yellow-500'}">
                        <div class="flex items-center gap-4 mb-4">
                            <div class="text-4xl font-bold text-purple-400">${result.answer}</div>
                            <div>
                                <div class="text-sm uppercase tracking-widest text-slate-500">Correct Option</div>
                                <div class="font-semibold text-white">${opts[result.answer]}</div>
                            </div>
                            <div class="ml-auto px-3 py-1 rounded-full text-[10px] font-bold bg-white/10 uppercase tracking-widest">
                                ${result.confidence} Confidence
                            </div>
                        </div>
                        <p class="text-sm text-slate-300 leading-relaxed">${result.explanation}</p>
                    </div>
                `;
            } catch (err) {
                resDiv.innerHTML = `<div class="p-4 bg-red-500/10 border border-red-500/50 rounded-xl text-red-400 text-sm">Error: ${err.message}</div>`;
            } finally {
                btn.disabled = false;
                btn.innerHTML = `<i data-lucide="zap" class="w-5 h-5"></i> Find Correct Answer`;
                lucide.createIcons();
            }
        }

        // --- Code Reviewer Logic ---
        function setupCodeExamples() {
            const examples = { js: 'function test() {}', py: 'def test():', react: 'export default function() {}' };
            const container = document.getElementById('codeExamples');
            Object.entries(examples).forEach(([lang, code]) => {
                const btn = document.createElement('button');
                btn.className = "px-2 py-1 text-[10px] rounded bg-white/10 hover:bg-white/20 uppercase font-bold";
                btn.innerText = lang;
                btn.onclick = () => document.getElementById('codeInput').value = code;
                container.appendChild(btn);
            });
        }

        async function analyzeCode() {
            if (!apiKey) return alert("Set API key first");
            const code = document.getElementById('codeInput').value.trim();
            if (!code) return;

            const btn = document.getElementById('analyzeBtn');
            const resDiv = document.getElementById('codeResult');

            btn.disabled = true;
            btn.innerHTML = `⏳ Analyzing...`;
            resDiv.innerHTML = `<div class="animate-spin h-8 w-8 border-2 border-purple-500 border-t-transparent rounded-full"></div>`;

            const prompt = `Review this code for bugs and improvements. Return JSON: {"improvements":[{"title":"...", "description":"..."}], "positive":{"title":"...", "description":"..."}}\n\nCode:\n${code}`;

            try {
                const response = await fetch("https://openrouter.ai/api/v1/chat/completions", {
                    method: "POST",
                    headers: {
                        "Authorization": `Bearer ${apiKey}`,
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify({
                        model: "openai/gpt-oss-120b:free",
                        messages: [{ role: "user", content: prompt }]
                    })
                });

                const data = await response.json();
                const result = JSON.parse(data.choices[0].message.content.match(/\{[\s\S]*\}/)[0]);

                resDiv.className = "glass rounded-2xl p-6 space-y-4 overflow-y-auto block h-full";
                resDiv.innerHTML = `
                    <h3 class="text-emerald-400 font-bold flex items-center gap-2"><i data-lucide="check-circle" class="w-5 h-5"></i> Strengths</h3>
                    <div class="bg-emerald-500/10 p-4 rounded-xl border border-emerald-500/20 mb-6">
                        <div class="font-bold text-emerald-200 text-sm mb-1">${result.positive.title}</div>
                        <p class="text-xs text-emerald-100/70">${result.positive.description}</p>
                    </div>
                    <h3 class="text-amber-400 font-bold flex items-center gap-2"><i data-lucide="alert-triangle" class="w-5 h-5"></i> Improvements</h3>
                    ${result.improvements.map(imp => `
                        <div class="bg-amber-500/10 p-4 rounded-xl border border-amber-500/20">
                            <div class="font-bold text-amber-200 text-sm mb-1">${imp.title}</div>
                            <p class="text-xs text-amber-100/70">${imp.description}</p>
                        </div>
                    `).join('')}
                `;
            } catch (err) {
                resDiv.innerHTML = `<p class="text-red-400">Error: ${err.message}</p>`;
            } finally {
                btn.disabled = false;
                btn.innerHTML = `<i data-lucide="search-code" class="w-5 h-5"></i> Review Code`;
                lucide.createIcons();
            }
        }

        window.onload = init;
    </script>
</body>
</html>
